name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  infrastructure:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure infrastructure
        run: |
          cd /vagrant
          vagrant up --provision

  build-and-push:
    runs-on: ubuntu-latest
    needs: infrastructure
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: awesso/laces-api:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to k3s
        run: |
          sudo kubectl apply -f /vagrant/k8s/
          sudo kubectl rollout restart deployment/laces-api
          sudo kubectl rollout status deployment/laces-api
