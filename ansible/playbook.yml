---
- name: Configure k3s server
  hosts: k3s
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install curl
      apt:
        name: curl
        state: present

    - name: Install k3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Enable and start k3s
      systemd:
        name: k3s
        enabled: yes
        state: started

    - name: Deploy kubernetes manifests
      shell: kubectl apply -f /vagrant/k8s/
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
